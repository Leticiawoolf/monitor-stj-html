<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Monitor TJRJ — Sugestões de Pauta</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #ffffff; --bg2: #f5f5f5; --border: #e0e0e0; --border2: #cccccc;
      --text: #1a1a1a; --text2: #555555; --accent: #185FA5; --accent-bg: #E6F1FB;
    }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: var(--bg); color: var(--text); padding: 1.5rem 1rem; }
    .container { max-width: 760px; margin: 0 auto; }
    .header { display: flex; align-items: flex-start; justify-content: space-between; gap: 1rem; margin-bottom: 1.5rem; flex-wrap: wrap; }
    .header h1 { font-size: 20px; font-weight: 600; }
    .header p { font-size: 13px; color: var(--text2); margin-top: 4px; }
    .badge { display: inline-flex; align-items: center; gap: 5px; font-size: 11px; background: #EAF3DE; color: #3B6D11; border-radius: 20px; padding: 3px 10px; font-weight: 500; }
    .dot { width: 6px; height: 6px; border-radius: 50%; background: #639922; animation: pulse 1.5s infinite; }
    @keyframes pulse { 0%,100%{opacity:1}50%{opacity:.3} }
    .stats { display: grid; grid-template-columns: repeat(auto-fit, minmax(120px, 1fr)); gap: 10px; margin-bottom: 1.5rem; }
    .stat { background: var(--bg2); border-radius: 10px; padding: 12px 14px; }
    .stat .num { font-size: 22px; font-weight: 600; }
    .stat .lbl { font-size: 11px; color: var(--text2); margin-top: 2px; }
    .cards { display: flex; flex-direction: column; gap: 10px; }
    .card { background: var(--bg); border: 1px solid var(--border); border-radius: 12px; padding: 1rem 1.25rem; cursor: pointer; transition: border-color .15s; }
    .card:hover { border-color: var(--border2); }
    .card.open { border-color: var(--border2); }
    .card-header { display: flex; align-items: flex-start; gap: 10px; }
    .card-title { font-size: 15px; font-weight: 500; flex: 1; line-height: 1.4; }
    .card-meta { display: flex; gap: 12px; margin-top: 8px; flex-wrap: wrap; }
    .card-meta span { font-size: 12px; color: var(--text2); }
    .proc { font-size: 11px; font-family: monospace; background: var(--bg2); padding: 2px 7px; border-radius: 4px; color: var(--text2); }
    .body { margin-top: 14px; padding-top: 14px; border-top: 1px solid var(--border); display: none; }
    .card.open .body { display: block; }
    .section { margin-bottom: 14px; }
    .section h4 { font-size: 11px; font-weight: 600; color: var(--text2); text-transform: uppercase; letter-spacing: .06em; margin-bottom: 6px; }
    .section p { font-size: 13px; line-height: 1.6; }
    .angulos { display: flex; flex-direction: column; gap: 5px; }
    .angulo { font-size: 13px; padding: 7px 10px; background: var(--bg2); border-radius: 8px; line-height: 1.5; }
    .angulo::before { content: "→ "; color: #378ADD; font-weight: 600; }
    .gloss { background: var(--bg2); border-radius: 8px; padding: 10px 12px; }
    .gloss h4 { font-size: 11px; font-weight: 600; color: var(--text2); margin-bottom: 6px; text-transform: uppercase; letter-spacing: .06em; }
    .gloss-item { display: flex; gap: 8px; margin-bottom: 5px; font-size: 12px; }
    .gloss-termo { font-weight: 600; min-width: 130px; flex-shrink: 0; }
    .gloss-def { color: var(--text2); line-height: 1.5; }
    .chevron { font-size: 14px; color: var(--text2); flex-shrink: 0; margin-top: 2px; transition: transform .2s; }
    .card.open .chevron { transform: rotate(180deg); }
    .footer { font-size: 11px; color: var(--text2); margin-top: 1.5rem; text-align: right; }
    .vazio { text-align: center; padding: 3rem; color: var(--text2); font-size: 14px; }
    .sem-traducao { font-size: 12px; color: var(--text2); font-style: italic; }
    .datas-info { display: flex; gap: 16px; flex-wrap: wrap; margin-top: 4px; }
    .data-item { font-size: 12px; color: var(--text2); }
    .data-item b { color: var(--text); font-weight: 600; }
  </style>
</head>
<body>
<div class="container">
  <div class="header">
    <div>
      <h1>Monitor TJRJ <span class="badge"><span class="dot"></span>Automático · a cada 3h</span></h1>
      <p>Pautas traduzidas com IA · Fonte: DataJud/CNJ via GitHub Actions</p>
    </div>
  </div>

  <div class="stats">
    <div class="stat"><div class="num" id="totalProcessos">—</div><div class="lbl">Processos encontrados</div></div>
    <div class="stat"><div class="num">TJRJ</div><div class="lbl">Tribunal monitorado</div></div>
    <div class="stat"><div class="num">3h</div><div class="lbl">Frequência de captura</div></div>
    <div class="stat"><div class="num" id="ultimaData">—</div><div class="lbl">Último movimento (geral)</div></div>
  </div>

  <div class="cards" id="cards"></div>
  <p class="footer">Fonte: <a href="https://datajud-wiki.cnj.jus.br" target="_blank">DataJud/CNJ</a> · tradução gerada por IA (Gemini)</p>
</div>

<script id="dados-processos" type="application/json">[]</script>
<script>
function formatarData(iso) {
  if (!iso) return "—";
  const d = new Date(iso);
  if (isNaN(d.getTime())) return "—";
  return d.toLocaleDateString("pt-BR", { day: "2-digit", month: "short", year: "numeric" });
}

function init() {
  let processos = [];
  try {
    const raw = document.getElementById("dados-processos").textContent;
    processos = JSON.parse(raw);
  } catch (e) {
    console.error("Erro ao carregar dados dos processos:", e);
    processos = [];
  }

  const grid = document.getElementById("cards");

  if (!processos.length) {
    grid.innerHTML = '<div class="vazio">Nenhum processo com movimentação recente no momento.</div>';
    document.getElementById("totalProcessos").textContent = "0";
    return;
  }

  document.getElementById("totalProcessos").textContent = processos.length;

  const datas = processos.map(p => p.dataUltimoMovimento).filter(Boolean).sort().reverse();
  if (datas.length) {
    document.getElementById("ultimaData").textContent = formatarData(datas[0]);
  }

  grid.innerHTML = processos.map((p, i) => {
    const assuntos = (p.assuntos || []).join(", ") || "—";
    const dataMovimento = formatarData(p.dataUltimoMovimento);
    const dataIndexacao = formatarData(p.ultimaAtualizacao);

    const titulo = p.titulo || `${p.classe || "Processo"} · ${assuntos}`;

    const temTraducao = p.resumo_simples || p.por_que_importa || (p.angulos && p.angulos.length) || (p.glossario && p.glossario.length);

    const corpoTraducao = temTraducao ? `
        <div class="section">
          <h4>Em linguagem simples</h4>
          <p>${p.resumo_simples || "—"}</p>
        </div>
        <div class="section">
          <h4>Por que importa para você</h4>
          <p>${p.por_que_importa || "—"}</p>
        </div>
        ${(p.angulos && p.angulos.length) ? `
        <div class="section">
          <h4>Ângulos de pauta</h4>
          <div class="angulos">${p.angulos.map(a => `<div class="angulo">${a}</div>`).join("")}</div>
        </div>` : ""}
        ${(p.glossario && p.glossario.length) ? `
        <div class="gloss">
          <h4>Glossário do juridiquês</h4>
          ${p.glossario.map(g => `<div class="gloss-item"><span class="gloss-termo">${g.termo}</span><span class="gloss-def">${g.definicao}</span></div>`).join("")}
        </div>` : ""}
    ` : `<p class="sem-traducao">Tradução ainda não disponível para este processo.</p>`;

    return `
    <div class="card" onclick="toggle(${i})">
      <div class="card-header">
        <span class="card-title">${titulo}</span>
        <i class="fa-solid fa-chevron-down chevron"></i>
      </div>
      <div class="card-meta">
        <span>👤 ${p.orgaoJulgador || "—"}</span>
        <span class="proc">${p.numeroProcesso || "—"}</span>
      </div>
      <div class="datas-info">
        <span class="data-item">📌 Último movimento: <b>${dataMovimento}</b></span>
        <span class="data-item">🔄 Indexado em: <b>${dataIndexacao}</b></span>
      </div>
      <div class="body">
        ${corpoTraducao}
        <div class="section">
          <h4>Dados do processo</h4>
          <p><b>Classe:</b> ${p.classe || "—"}<br>
          <b>Assuntos:</b> ${assuntos}<br>
          <b>Órgão julgador:</b> ${p.orgaoJulgador || "—"}<br>
          <b>Último movimento:</b> ${p.ultimoMovimento || "—"} (${dataMovimento})<br>
          <b>Indexado pelo CNJ em:</b> ${dataIndexacao}</p>
          <p style="margin-top:8px;font-size:11px;color:var(--text2)">
            A data de indexação indica quando esse registro foi atualizado na base do
            CNJ, podendo ser diferente da data do último movimento processual real.
          </p>
        </div>
      </div>
    </div>`;
  }).join("");
}

function toggle(id) {
  const cards = document.querySelectorAll(".card");
  const card = cards[id];
  if (!card) return;
  card.classList.toggle("open");
}

init();
</script>
</body>
</html>
