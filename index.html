<script>
function formatarData(iso) {
  if (!iso) return "—";
  const d = new Date(iso);
  if (isNaN(d.getTime())) return "—";
  return d.toLocaleDateString("pt-BR", { day: "2-digit", month: "short", year: "numeric" });
}

    return;
  }

  document.getElementById("totalProcessos").textContent = processos.length;

  const datas = processos.map(p => p.dataUltimoMovimento).filter(Boolean).sort().reverse();
  if (datas.length) {
    document.getElementById("ultimaData").textContent = formatarData(datas[0]);
  }

  grid.innerHTML = processos.map((p, i) => {
    const assuntos = (p.assuntos || []).join(", ") || "—";
    const dataMovimento = formatarData(p.dataUltimoMovimento);
    const dataIndexacao = formatarData(p.ultimaAtualizacao);

    const titulo = p.titulo || `${p.classe || "Processo"} · ${assuntos}`;

    const temTraducao = p.resumo_simples || p.por_que_importa || (p.angulos && p.angulos.length) || (p.glossario && p.glossario.length);

    const corpoTraducao = temTraducao ? `
        <div class="section">
          <h4>Em linguagem simples</h4>
          <p>${p.resumo_simples || "—"}</p>
        </div>
        <div class="section">
          <h4>Por que importa para você</h4>
          <p>${p.por_que_importa || "—"}</p>
        </div>
        ${(p.angulos && p.angulos.length) ? `
        <div class="section">
          <h4>Ângulos de pauta</h4>
          <div class="angulos">${p.angulos.map(a => `<div class="angulo">${a}</div>`).join("")}</div>
        </div>` : ""}
        ${(p.glossario && p.glossario.length) ? `
        <div class="gloss">
          <h4>Glossário do juridiquês</h4>
          ${p.glossario.map(g => `<div class="gloss-item"><span class="gloss-termo">${g.termo}</span><span class="gloss-def">${g.definicao}</span></div>`).join("")}
        </div>` : ""}
    ` : `<p class="sem-traducao">Tradução ainda não disponível para este processo.</p>`;

    return `
    <div class="card" onclick="toggle(${i})">
      <div class="card-header">
        <span class="card-title">${titulo}</span>
        <i class="fa-solid fa-chevron-down chevron"></i>
      </div>
      <div class="card-meta">
        <span>👤 ${p.orgaoJulgador || "—"}</span>
        <span class="proc">${p.numeroProcesso || "—"}</span>
      </div>
      <div class="datas-info">
        <span class="data-item">📌 Último movimento: <b>${dataMovimento}</b></span>
        <span class="data-item">🔄 Indexado em: <b>${dataIndexacao}</b></span>
      </div>
      <div class="body">
        ${corpoTraducao}
        <div class="section">
          <h4>Dados do processo</h4>
          <p><b>Classe:</b> ${p.classe || "—"}<br>
          <b>Assuntos:</b> ${assuntos}<br>
          <b>Órgão julgador:</b> ${p.orgaoJulgador || "—"}<br>
          <b>Último movimento:</b> ${p.ultimoMovimento || "—"} (${dataMovimento})<br>
          <b>Indexado pelo CNJ em:</b> ${dataIndexacao}</p>
          <p style="margin-top:8px;font-size:11px;color:var(--text2)">
            A data de indexação indica quando esse registro foi atualizado na base do
            CNJ, podendo ser diferente da data do último movimento processual real.
          </p>
        </div>
      </div>
    </div>`;
  }).join("");
}

function toggle(id) {
  const cards = document.querySelectorAll(".card");
  const card = cards[id];
  if (!card) return;
  card.classList.toggle("open");
}

init();
</script>
</body>
</html>
