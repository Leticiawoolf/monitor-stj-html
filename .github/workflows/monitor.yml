name: Monitor TJRJ

on:
  push:
    paths:
      - 'pautas.json'
      - 'ultima_captura.json'
  workflow_dispatch:

jobs:
  processar:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - run: pip install -r requirements.txt

      - name: Traduzir com Gemini
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python gerar_pautas.py

      - name: Injetar dados no index.html
        run: |
          python - << 'PYEOF'
          import json, re

          with open("pautas_traduzidas.json", "r", encoding="utf-8") as f:
              dados = json.load(f)

          with open("index.html", "r", encoding="utf-8") as f:
              html = f.read()

          novo_json = json.dumps(dados, ensure_ascii=False)
          novo_bloco = f'<script id="dados-processos" type="application/json">{novo_json}</script>'

          html = re.sub(
              r'<script id="dados-processos" type="application/json">.*?</script>',
              novo_bloco,
              html,
              flags=re.DOTALL
          )

          with open("index.html", "w", encoding="utf-8") as f:
              f.write(html)

          print(f"index.html atualizado com {len(dados)} processos")
          PYEOF

      - name: Enviar para Telegram
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python enviar_telegram.py

      - name: Salvar estado
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add pautas_traduzidas.json index.html ultimo_envio_telegram.json
          git diff --staged --quiet || git commit -m "Atualiza traducao e dashboard [skip ci]"
          git pull --rebase origin main
          git push
