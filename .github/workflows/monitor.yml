name: Monitor STJ

on:
  schedule:
    - cron: '*/5 * * * *' # Executa a cada 5 minutos (o limite mínimo do GitHub)
  workflow_dispatch: # Permite que você clique em "Run workflow" manualmente

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Code Checkout
      uses: actions/checkout@v3

    - name: Setup Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install requests

    - name: Run Monitor Script
      env:
        TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
        TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        DATAJUD_API_KEY: ${{ secrets.DATAJUD_API_KEY }}
      run: python monitor_stj.py

    - name: Inject Data into index.html
      run: |
        if [ -f pautas.json ]; then
          # Lê o conteúdo do pautas.json e remove quebras de linha para não quebrar o script
          DATA=$(cat pautas.json | tr -d '\n' | tr -d '\r')
          # Substitui a linha do array vazio no index.html pelos dados reais
          sed -i "s/const PROCESSOS_DATA = \[\];/const PROCESSOS_DATA = $DATA;/g" index.html
          echo "Dados injetados com sucesso no index.html"
        else
          echo "Aviso: pautas.json não foi gerado pelo script."
        fi

    - name: Commit and Push Changes
      run: |
        git config --global user.name "GitHub Actions Bot"
        git config --global user.email "actions@github.com"
        git add index.html pautas.json || true
        git commit -m "🤖 Atualização automática: Processos do DataJud" || true
        git push origin main || true
