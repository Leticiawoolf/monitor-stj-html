name: Monitor STJ

on:
  schedule:
    - cron: '0 */3 * * *'
  workflow_dispatch:

jobs:
  monitorar:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - run: pip install -r requirements.txt

      - name: Capturar processos
        env:
          DATAJUD_API_KEY: ${{ secrets.DATAJUD_API_KEY }}
        run: python monitor_stj.py

      - name: Enviar para Telegram
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python enviar_telegram.py

      - name: Salvar estado
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add estado_stj.json pautas.json
          git diff --staged --quiet || git commit -m "Atualiza estado [skip ci]"
          git push
